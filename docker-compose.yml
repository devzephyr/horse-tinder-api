services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: horsetinder
      POSTGRES_PASSWORD: password
      POSTGRES_DB: horsetinder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U horsetinder"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
